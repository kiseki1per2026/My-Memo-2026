<!DOCTYPE html>
<html class="dark" lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Memo</title>

    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f59e0b", // Amber
                        "background-light": "#f8f7f5",
                        "background-dark": "#0f172a", // Deep Indigo/Navy
                        "card-dark": "#1e293b", // Slightly lighter indigo
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                },
            },
        }
    </script>

    <style>
        body {
            font-family: 'Manrope', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .glass-effect {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(245, 158, 11, 0.1);
        }

        /* タイル状レイアウト */
        #cardContainer {
            column-width: 250px;
            column-gap: 16px;
        }

        @media (max-width: 639px) {

            /* スマホ環境: 画面幅が狭くても最低2列を維持 */
            #cardContainer {
                column-width: auto;
                column-count: 2;
                column-gap: 12px;
            }
        }

        .keep-card {
            border-radius: 0.75rem;
            margin-bottom: 16px;
            break-inside: avoid;
            transition: transform 0.2s, box-shadow 0.2s;
            overflow: hidden;
            height: fit-content;
        }

        /* グリップ部分のみドラッグを許可 */
        .drag-handle {
            touch-action: none;
            cursor: grab;
        }

        /* ドラッグ中のスタイル */
        .sortable-ghost {
            opacity: 0.3;
            transform: scale(0.95);
        }

        .sortable-drag {
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            transform: rotate(2deg);
            z-index: 100;
        }

        /* チェック後の文字の視認性を改善 */
        .item-row.checked {
            background-color: rgba(255, 255, 255, 0.03);
        }

        .checked-text {
            text-decoration: line-through;
            color: #94a3b8;
            /* Tailwind slate-400 */
        }

        .date-badge {
            font-size: 0.65rem;
            font-weight: 800;
            padding: 2px 6px;
            border-radius: 4px;
            background: #f59e0b;
            /* primary color */
            color: #0f172a;
            /* background-dark */
            margin-left: auto;
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .tab-btn {
            padding: 12px 16px;
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            flex-shrink: 0;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .tab-btn.active {
            color: #f59e0b;
            border-bottom: 2px solid #f59e0b;
        }

        .color-dot {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        /* カラーテーマ (Dark Mode UIに合わせた調整) */
        .bg-white {
            background-color: rgba(30, 41, 59, 0.7) !important;
        }

        /* match glass effect */
        .bg-red {
            background-color: rgba(69, 10, 10, 0.6) !important;
            border: 1px solid rgba(248, 113, 113, 0.2) !important;
        }

        .bg-orange {
            background-color: rgba(124, 45, 18, 0.6) !important;
            border: 1px solid rgba(251, 146, 60, 0.2) !important;
        }

        .bg-yellow {
            background-color: rgba(113, 63, 18, 0.6) !important;
            border: 1px solid rgba(250, 204, 21, 0.2) !important;
        }

        .bg-green {
            background-color: rgba(5, 46, 22, 0.6) !important;
            border: 1px solid rgba(74, 222, 128, 0.2) !important;
        }

        .bg-teal {
            background-color: rgba(19, 78, 74, 0.6) !important;
            border: 1px solid rgba(45, 212, 191, 0.2) !important;
        }

        .bg-blue {
            background-color: rgba(23, 37, 84, 0.6) !important;
            border: 1px solid rgba(96, 165, 250, 0.2) !important;
        }

        .bg-purple {
            background-color: rgba(59, 7, 100, 0.6) !important;
            border: 1px solid rgba(192, 132, 252, 0.2) !important;
        }

        .bg-gray {
            background-color: rgba(15, 23, 42, 0.6) !important;
            border: 1px solid rgba(148, 163, 184, 0.2) !important;
        }
    </style>
</head>

<body class="bg-background-dark font-display text-slate-100 min-h-screen flex flex-col pb-32">

    <header class="sticky top-0 z-50 glass-effect pt-4 border-b border-primary/10">
        <div class="max-w-7xl mx-auto px-4 flex items-center justify-between mb-2">
            <div class="flex items-center gap-3">
                <div class="p-2 rounded-lg bg-primary/10 text-primary">
                    <i data-lucide="check-circle-2" class="w-5 h-5"></i>
                </div>
                <h1 class="text-xl font-extrabold tracking-tight text-slate-100">My <span
                        class="text-primary">Memo</span></h1>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="exportData()" title="エクスポート"
                    class="p-2 rounded-full hover:bg-white/5 text-slate-400 hover:text-primary transition-colors">
                    <i data-lucide="download" class="w-5 h-5"></i>
                </button>
                <button onclick="importData()" title="インポート"
                    class="p-2 rounded-full hover:bg-white/5 text-slate-400 hover:text-primary transition-colors">
                    <i data-lucide="upload" class="w-5 h-5"></i>
                </button>
            </div>
        </div>
        <nav class="flex overflow-x-auto no-scrollbar max-w-7xl mx-auto px-4" id="tabBar"></nav>
    </header>

    <main class="flex-1 max-w-7xl mx-auto w-full p-3 md:p-6 mt-2">
        <div id="cardContainer"></div>
    </main>

    <div class="fixed bottom-8 right-6 z-50">
        <button onclick="addNewCard()"
            class="h-14 w-14 bg-primary text-background-dark rounded-full shadow-lg shadow-primary/20 flex items-center justify-center transform active:scale-95 transition-transform hover:bg-opacity-90">
            <i data-lucide="plus" class="w-7 h-7"></i>
        </button>
    </div>

    <script>
        let currentTabId = 'tab1';
        let appState = {
            data: { tab1: [], tab2: [], tab3: [], tab4: [] },
            tabs: { tab1: 'Main', tab2: 'ShopⅠ', tab3: 'ShopⅡ', tab4: 'etc' }
        };
        let sortableInstance = null;

        const COLORS = [
            { name: 'white', class: 'bg-white' }, { name: 'red', class: 'bg-red' },
            { name: 'orange', class: 'bg-orange' }, { name: 'yellow', class: 'bg-yellow' },
            { name: 'green', class: 'bg-green' }, { name: 'teal', class: 'bg-teal' },
            { name: 'blue', class: 'bg-blue' }, { name: 'purple', class: 'bg-purple' },
            { name: 'gray', class: 'bg-gray' }
        ];

        function init() {
            const savedData = localStorage.getItem('memo_pro_final_data');
            const savedTabs = localStorage.getItem('memo_pro_final_tabs');
            if (savedData) appState.data = JSON.parse(savedData);
            if (savedTabs) appState.tabs = JSON.parse(savedTabs);
            renderTabs();
            renderCards();
        }

        function save() {
            localStorage.setItem('memo_pro_final_data', JSON.stringify(appState.data));
            localStorage.setItem('memo_pro_final_tabs', JSON.stringify(appState.tabs));
        }

        function renderTabs() {
            const tabBar = document.getElementById('tabBar');
            tabBar.innerHTML = '';
            Object.keys(appState.tabs).forEach(id => {
                const isActive = currentTabId === id;
                const btn = document.createElement('div');
                btn.className = `tab-btn ${isActive ? 'active' : 'text-slate-500 hover:text-slate-300'}`;

                const span = document.createElement('span');
                span.innerText = appState.tabs[id];
                span.onclick = () => { currentTabId = id; renderTabs(); renderCards(); };
                btn.appendChild(span);

                if (isActive) {
                    const editBtn = document.createElement('button');
                    editBtn.className = "ml-2 opacity-50 hover:opacity-100 p-1 text-primary";
                    editBtn.innerHTML = '<i data-lucide="pencil" class="w-3 h-3"></i>';
                    editBtn.onclick = (e) => { e.stopPropagation(); renameTab(id); };
                    btn.appendChild(editBtn);
                }
                tabBar.appendChild(btn);
            });
            lucide.createIcons();
        }

        function renameTab(id) {
            const newName = prompt('カテゴリ名を変更:', appState.tabs[id]);
            if (newName && newName.trim()) {
                appState.tabs[id] = newName.trim();
                save();
                renderTabs();
            }
        }

        function renderCards() {
            const container = document.getElementById('cardContainer');
            container.innerHTML = '';
            const cards = appState.data[currentTabId] || [];

            cards.forEach(card => {
                const cardEl = document.createElement('div');
                const needsGlass = (card.color === 'bg-white' || !card.color);
                cardEl.className = `keep-card group ${card.color || 'bg-white'} ${needsGlass ? 'glass-effect' : 'glass-effect'}`;
                cardEl.dataset.id = card.id;

                // Add a small badge if we have items
                const labelColor = "bg-primary text-background-dark";
                const labelText = (card.items && card.items.length > 0) ? "List" : "Note";

                cardEl.innerHTML = `
                    <div class="card-inner p-4 flex flex-col gap-3">
                        <div class="flex justify-between items-start -mt-1 mb-1">
                            <span class="text-[10px] font-bold uppercase tracking-widest px-2 py-0.5 rounded ${labelColor}">${labelText}</span>
                            <div class="flex items-center gap-1">
                                <div class="drag-handle p-1 opacity-30 group-hover:opacity-100 transition-opacity text-slate-400 hover:text-slate-100">
                                    <i data-lucide="grip-horizontal" class="w-4 h-4"></i>
                                </div>
                                <button onclick="deleteCard('${card.id}')" class="opacity-0 group-hover:opacity-100 text-slate-500 hover:text-red-400 p-1 transition-all">
                                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </div>
                        <h3 contenteditable="true" class="font-bold text-slate-100 text-base leading-tight outline-none break-all" onblur="updateTitle('${card.id}', this.innerText)">${card.title}</h3>
                        <div class="flex flex-col gap-1.5 text-sm">
                            ${(card.items || []).map(item => `
                                <div class="item-row flex items-center p-1.5 -mx-1.5 rounded-lg cursor-pointer transition-all ${item.checked ? 'checked' : 'hover:bg-white/5'}" onclick="toggleItem('${card.id}', '${item.id}')">
                                    <i data-lucide="${item.checked ? 'check-circle-2' : 'circle'}" class="w-4 h-4 mr-2 flex-shrink-0 ${item.checked ? 'text-primary' : 'text-slate-500'}"></i>
                                    <span class="flex-1 break-all leading-tight ${item.checked ? 'checked-text' : 'text-slate-100'}">${item.text}</span>
                                    ${item.date ? `<span class="date-badge ml-2">${item.date}</span>` : `<button onclick="deleteItem('${card.id}', '${item.id}', event)" class="opacity-0 group-hover:opacity-40 hover:opacity-100 p-1 text-slate-400 hover:text-primary flex-shrink-0 ml-1"><i data-lucide="x" class="w-3 h-3"></i></button>`}
                                </div>
                            `).join('')}
                        </div>
                        <div class="mt-2 flex items-center border-b border-white/10 focus-within:border-primary transition-colors">
                            <input type="text" id="input-${card.id}" placeholder="＋ 追加" class="bg-transparent text-sm w-full py-2 focus:outline-none text-slate-200 placeholder-slate-500" onkeydown="if(event.key==='Enter') addItem('${card.id}')">
                        </div>
                        <div class="mt-3 flex gap-1.5 opacity-0 group-hover:opacity-100 transition-opacity overflow-x-auto no-scrollbar pb-1">
                            ${COLORS.map(c => `<div onclick="updateColor('${card.id}', '${c.class}')" class="color-dot ${c.class}"></div>`).join('')}
                        </div>
                    </div>
                `;
                container.appendChild(cardEl);
            });

            lucide.createIcons();
            // Wait slightly longer for icons to render before resizing
            setTimeout(resizeAll, 50);
            initSortable();
        }

        function initSortable() {
            const container = document.getElementById('cardContainer');
            if (sortableInstance) sortableInstance.destroy();

            sortableInstance = new Sortable(container, {
                animation: 250,
                handle: '.drag-handle', // グリップアイコンのみドラッグ可能にする
                ghostClass: 'sortable-ghost',
                dragClass: 'sortable-drag',
                forceFallback: false, // ブラウザ標準のドラッグを使用（スクロールを優先）
                onEnd: () => {
                    const newOrder = Array.from(container.querySelectorAll('.keep-card')).map(el =>
                        appState.data[currentTabId].find(c => c.id === el.dataset.id)
                    );
                    appState.data[currentTabId] = newOrder;
                    save();
                    resizeAll();
                }
            });
        }

        function addNewCard() {
            if (!appState.data[currentTabId]) appState.data[currentTabId] = [];
            // 新しいリスト（タイル）として追加
            const newCard = { id: 'c' + Date.now(), title: '新しいリスト', color: 'bg-white', items: [] };
            appState.data[currentTabId].unshift(newCard); // 先頭に追加
            save();
            renderCards();
        }

        function deleteCard(id) {
            if (confirm('このカードを削除しますか？')) {
                appState.data[currentTabId] = appState.data[currentTabId].filter(c => c.id !== id);
                save();
                renderCards();
            }
        }

        function updateTitle(cardId, text) {
            const card = appState.data[currentTabId].find(c => c.id === cardId);
            if (card) { card.title = text || '無題'; save(); }
        }

        function updateColor(cardId, colorClass) {
            const card = appState.data[currentTabId].find(c => c.id === cardId);
            if (card) { card.color = colorClass; save(); renderCards(); }
        }

        function addItem(cardId) {
            const input = document.getElementById(`input-${cardId}`);
            const text = input.value.trim();
            if (text) {
                const card = appState.data[currentTabId].find(c => c.id === cardId);
                const newItem = { id: 'it' + Date.now(), text: text, checked: false };
                const firstChecked = card.items.findIndex(i => i.checked);
                if (firstChecked === -1) card.items.push(newItem);
                else card.items.splice(firstChecked, 0, newItem);
                input.value = '';
                save();
                renderCards();
            }
        }

        function toggleItem(cardId, itemId) {
            const card = appState.data[currentTabId].find(c => c.id === cardId);
            const item = card.items.find(i => i.id === itemId);
            item.checked = !item.checked;
            if (item.checked) {
                const now = new Date();
                item.date = `${now.getMonth() + 1}/${now.getDate()}`;
                item.ts = Date.now();
            } else {
                delete item.date;
                delete item.ts;
            }
            card.items.sort((a, b) => {
                if (a.checked !== b.checked) return a.checked ? 1 : -1;
                if (a.checked) return (a.ts || 0) - (b.ts || 0);
                return 0;
            });
            save();
            renderCards();
        }

        function deleteItem(cardId, itemId, e) {
            e.stopPropagation();
            const card = appState.data[currentTabId].find(c => c.id === cardId);
            card.items = card.items.filter(i => i.id !== itemId);
            save();
            renderCards();
        }

        function resizeAll() {
            // 個別の行の高さ計算（masonry）のロジックは標準CSSグリッドに変更したため削除
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(appState)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `my-memo-pro-backup-${new Date().toISOString().slice(0, 10)}.json`;
            a.click();
        }

        function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = ".json";
            input.onchange = e => {
                const reader = new FileReader();
                reader.onload = ev => {
                    try {
                        const data = JSON.parse(ev.target.result);
                        if (data.data && data.tabs) {
                            appState = data;
                            save();
                            renderTabs();
                            renderCards();
                        }
                    } catch (err) { alert("無効なファイルです"); }
                };
                reader.readAsText(e.target.files[0]);
            };
            input.click();
        }

        window.onload = init;
        window.onresize = resizeAll;
        const observer = new MutationObserver(resizeAll);
        observer.observe(document.body, { childList: true, subtree: true, characterData: true });
    </script>
</body>

</html>
