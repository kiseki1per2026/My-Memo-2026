<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Memo Pro - Hybrid Sync</title>
    
    <meta name="theme-color" content="#f97316">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // Global State
        let currentTabId = 'tab1';
        let appState = { 
            data: { tab1: [], tab2: [], tab3: [], tab4: [] }, 
            tabs: { tab1: 'メイン', tab2: '店舗別', tab3: '予備', tab4: 'リスト' } 
        };
        let currentUser = null;
        let db = null;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'my-memo-pro-v1';

        // 1. まずローカルデータを読み込んで表示する (即時性優先)
        function loadFromLocalStorage() {
            const savedData = localStorage.getItem('memo_pro_hybrid_data');
            const savedTabs = localStorage.getItem('memo_pro_hybrid_tabs');
            if (savedData) appState.data = JSON.parse(savedData);
            if (savedTabs) appState.tabs = JSON.parse(savedTabs);
            renderTabs();
            renderCards();
        }

        function saveToLocalStorage() {
            localStorage.setItem('memo_pro_hybrid_data', JSON.stringify(appState.data));
            localStorage.setItem('memo_pro_hybrid_tabs', JSON.stringify(appState.tabs));
        }

        // 2. Firebase初期化 (バックグラウンドで実施)
        async function initFirebase() {
            try {
                const config = JSON.parse(__firebase_config);
                const app = initializeApp(config);
                const auth = getAuth(app);
                db = getFirestore(app);

                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        currentUser = user;
                        document.getElementById('userIdDisplay').innerText = `ID: ${user.uid}`;
                        document.getElementById('cloudBtn').disabled = false;
                        document.getElementById('cloudBtn').classList.remove('opacity-50');
                    }
                });

                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) {
                console.error("Firebase Init Error:", e);
                document.getElementById('userIdDisplay').innerText = "クラウド未接続 (オフライン動作中)";
            }
        }

        // 3. 手動同期処理
        window.syncToCloud = async () => {
            if (!currentUser || !db) {
                alert("クラウドに接続できていません。ネットワークを確認してください。");
                return;
            }
            const btn = document.getElementById('cloudBtn');
            const originalText = btn.innerText;
            btn.innerText = "同期中...";
            btn.disabled = true;

            try {
                const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'settings', 'main');
                await setDoc(docRef, { 
                    data: appState.data, 
                    tabs: appState.tabs,
                    lastUpdated: Date.now()
                }, { merge: true });
                alert("クラウドに保存しました！他端末で同じIDを入力して読み込めます。");
            } catch (e) {
                alert("保存エラー: " + e.message);
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        };

        window.loadFromCloud = async () => {
            const otherId = prompt("読み込みたい端末のIDを入力してください：");
            if (!otherId || !otherId.trim() || !db) return;

            try {
                const docRef = doc(db, 'artifacts', appId, 'users', otherId.trim(), 'settings', 'main');
                const snap = await getDoc(docRef);
                if (snap.exists()) {
                    if (confirm("クラウドのデータに書き換えますか？現在の内容は上書きされます。")) {
                        const cloudData = snap.data();
                        appState.data = cloudData.data;
                        appState.tabs = cloudData.tabs;
                        saveToLocalStorage();
                        renderTabs();
                        renderCards();
                        alert("読み込み完了！");
                    }
                } else {
                    alert("指定されたIDのデータが見つかりません。");
                }
            } catch (e) {
                alert("読み込みエラー: " + e.message);
            }
        };

        // UIレンダリング
        window.renderTabs = () => {
            const tabBar = document.getElementById('tabBar');
            tabBar.innerHTML = '';
            Object.keys(appState.tabs).forEach(id => {
                const isActive = currentTabId === id;
                const btn = document.createElement('div');
                btn.className = `tab-btn ${isActive ? 'active' : 'opacity-40'}`;
                btn.innerHTML = `<span onclick="window.switchTab('${id}')">${appState.tabs[id]}</span>`;
                tabBar.appendChild(btn);
            });
            lucide.createIcons();
        };

        window.switchTab = (id) => { currentTabId = id; renderTabs(); renderCards(); };

        window.renderCards = () => {
            const container = document.getElementById('cardContainer');
            container.innerHTML = '';
            const cards = appState.data[currentTabId] || [];
            
            cards.forEach(card => {
                const div = document.createElement('div');
                div.className = `keep-card ${card.color || 'bg-white'}`;
                div.innerHTML = `
                    <div class="card-inner p-4">
                        <div class="flex justify-between mb-2">
                            <div class="font-bold outline-none" contenteditable="true" onblur="window.updateTitle('${card.id}', this.innerText)">${card.title}</div>
                            <button onclick="window.deleteCard('${card.id}')" class="text-gray-400 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                        <div class="space-y-1">
                            ${(card.items || []).map(it => `
                                <div class="flex items-center text-sm ${it.checked ? 'opacity-50' : ''}" onclick="window.toggleItem('${card.id}', '${it.id}')">
                                    <i data-lucide="${it.checked ? 'check-circle' : 'circle'}" class="w-4 h-4 mr-2 ${it.checked ? 'text-orange-500' : ''}"></i>
                                    <span class="${it.checked ? 'line-through' : ''}">${it.text}</span>
                                </div>
                            `).join('')}
                        </div>
                        <input type="text" placeholder="+ 追加" class="w-full mt-2 bg-transparent border-b border-black/10 text-sm outline-none" 
                               onkeydown="if(event.key==='Enter') window.addItem('${card.id}', this)">
                    </div>
                `;
                container.appendChild(div);
            });
            lucide.createIcons();
            resizeGrid();
        };

        window.addItem = (cardId, el) => {
            const text = el.value.trim();
            if(!text) return;
            const card = appState.data[currentTabId].find(c => c.id === cardId);
            card.items.push({ id: Date.now().toString(), text, checked: false });
            el.value = '';
            saveToLocalStorage();
            renderCards();
        };

        window.toggleItem = (cardId, itemId) => {
            const card = appState.data[currentTabId].find(c => c.id === cardId);
            const item = card.items.find(it => it.id === itemId);
            item.checked = !item.checked;
            saveToLocalStorage();
            renderCards();
        };

        window.addNewCard = () => {
            appState.data[currentTabId].unshift({ id: Date.now().toString(), title: '新規', color: 'bg-white', items: [] });
            saveToLocalStorage();
            renderCards();
        };

        window.updateTitle = (cardId, val) => {
            const card = appState.data[currentTabId].find(c => c.id === cardId);
            card.title = val;
            saveToLocalStorage();
        };

        window.deleteCard = (cardId) => {
            if(confirm('削除しますか？')) {
                appState.data[currentTabId] = appState.data[currentTabId].filter(c => c.id !== cardId);
                saveToLocalStorage();
                renderCards();
            }
        };

        function resizeGrid() {
            const container = document.getElementById('cardContainer');
            const cards = container.querySelectorAll('.keep-card');
            cards.forEach(card => {
                const height = card.querySelector('.card-inner').getBoundingClientRect().height;
                card.style.gridRowEnd = `span ${Math.ceil((height + 15) / 10)}`;
            });
        }

        window.onload = () => {
            loadFromLocalStorage();
            initFirebase();
            window.addEventListener('resize', resizeGrid);
        };
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; background: #f8f9fa; }
        #cardContainer { display: grid; grid-template-columns: repeat(2, 1fr); grid-auto-rows: 10px; gap: 0 12px; }
        .keep-card { border-radius: 12px; border: 1px solid #e0e0e0; overflow: hidden; height: fit-content; }
        .tab-btn { padding: 12px; font-size: 0.8rem; cursor: pointer; border-bottom: 2px solid transparent; }
        .tab-btn.active { color: #f97316; border-bottom-color: #f97316; font-weight: bold; }
        .bg-white { background: white; }
    </style>
</head>
<body class="pb-40">

    <header class="bg-white border-b sticky top-0 z-50">
        <div class="p-4 flex items-center justify-between">
            <h1 class="font-bold text-orange-500 flex items-center gap-2">
                <i data-lucide="check-square"></i> My Memo Pro
            </h1>
            <div id="userIdDisplay" class="text-[8px] text-gray-400 max-w-[100px] truncate">接続中...</div>
        </div>
        <div id="tabBar" class="flex overflow-x-auto px-2"></div>
    </header>

    <main class="p-3">
        <div id="cardContainer"></div>
    </main>

    <footer class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 space-y-2">
        <div class="flex gap-2">
            <button id="cloudBtn" onclick="window.syncToCloud()" class="flex-1 bg-orange-500 text-white py-3 rounded-xl text-sm font-bold opacity-50 transition-all">
                クラウドへ保存
            </button>
            <button onclick="window.loadFromCloud()" class="flex-1 bg-gray-100 text-gray-700 py-3 rounded-xl text-sm font-bold">
                クラウドから読込
            </button>
        </div>
        <div class="text-[10px] text-center text-gray-400">
            IDをコピーして他端末の「読込」に入力すると同期できます
        </div>
        <button onclick="const id=document.getElementById('userIdDisplay').innerText.replace('ID: ',''); navigator.clipboard.writeText(id); alert('IDをコピーしました');" 
                class="w-full text-[10px] text-blue-500 underline">自分のIDをコピー</button>
    </footer>

    <button onclick="window.addNewCard()" class="fixed bottom-32 right-6 bg-orange-600 text-white p-4 rounded-full shadow-2xl z-50">
        <i data-lucide="plus" class="w-6 h-6"></i>
    </button>

</body>
</html>
