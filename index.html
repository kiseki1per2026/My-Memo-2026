<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Memo</title>
    
    <meta name="theme-color" content="#242c38">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'memo-primary': '#97a37e', // 添付画像のニュートラルな緑
                        'memo-orange': '#ea580c', // 視認性の良い深いオレンジ
                    },
                },
            },
        };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
        
        /* 全体背景：少しだけ明るくして沈み込みを防止 */
        body { 
            font-family: 'Noto Sans JP', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            background-color: #1a202c; 
            color: #f3f4f6; 
        }
        
        #cardContainer { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            grid-auto-rows: 1px; 
            gap: 0 12px; 
            align-items: start; 
        }
        @media (min-width: 768px) { 
            #cardContainer { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 0 20px; } 
        }

        .keep-card { 
            border-radius: 16px; 
            margin-bottom: 12px; 
            transition: transform 0.2s, box-shadow 0.2s; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2); 
            border: 1px solid rgba(255,255,255,0.1); 
            overflow: hidden; 
            height: fit-content;
            position: relative;
            z-index: 1;
            background-clip: padding-box;
        }

        /* カードのベース背景色 */
        .bg-card-white { background-color: #2d3748; }
        .bg-card-red { background-color: #5a1a1a; }
        .bg-card-orange { background-color: #5a2e1a; }
        .bg-card-yellow { background-color: #5a4e1a; }
        .bg-card-green { background-color: #1a3a1a; }
        .bg-card-teal { background-color: #1a3a3a; }
        .bg-card-blue { background-color: #1a2a5a; }
        .bg-card-purple { background-color: #3a1a5a; }
        .bg-card-gray { background-color: #3d4655; }

        .card-title {
            color: #97a37e; /* 商品名の白と差別化 */
            font-weight: 800;
            letter-spacing: 0.025em;
        }

        .drag-handle { touch-action: none; cursor: grab; }
        .sortable-ghost { opacity: 0.3; transform: scale(0.95); }
        .sortable-drag { box-shadow: 0 10px 20px rgba(0,0,0,0.3); transform: rotate(2deg); z-index: 100; }

        .item-row.checked { opacity: 0.4; }
        .checked-text { text-decoration: line-through; color: #a0aec0; }
        
        /* 日付バッジ：深いオレンジ ＋ 黒文字 */
        .date-badge { 
            font-size: 0.65rem; 
            font-weight: 900; 
            padding: 2px 6px; 
            border-radius: 4px; 
            background: #ea580c !important; 
            color: #000000 !important; 
            margin-left: auto; 
            white-space: nowrap;
        }

        .tab-btn { padding: 12px 16px; font-weight: 500; font-size: 0.85rem; cursor: pointer; border-bottom: 3px solid transparent; flex-shrink: 0; transition: all 0.2s; color: #718096; }
        .tab-btn.active { color: #97a37e; border-bottom: 3px solid #97a37e; background-color: rgba(151, 163, 126, 0.1); }
        
        .color-dot { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        input::placeholder { color: #718096; }
    </style>
</head>
<body class="pb-32">

    <header class="bg-gray-900/95 backdrop-blur-md sticky top-0 z-50 border-b border-gray-800">
        <div class="max-w-7xl mx-auto px-4 flex items-center h-14 justify-between">
            <div class="flex items-center space-x-2">
                <div class="bg-memo-primary p-1.5 rounded-lg text-white">
                    <i data-lucide="check-circle-2" class="w-5 h-5"></i>
                </div>
                <h1 class="font-bold text-base tracking-tight text-white">My Memo</h1>
            </div>
            <div class="flex gap-2">
                <button onclick="exportData()" title="エクスポート" class="p-2 text-gray-400 hover:text-memo-primary"><i data-lucide="download" class="w-5 h-5"></i></button>
                <button onclick="importData()" title="インポート" class="p-2 text-gray-400 hover:text-memo-primary"><i data-lucide="upload" class="w-5 h-5"></i></button>
            </div>
        </div>
        <div id="tabBar" class="flex overflow-x-auto no-scrollbar px-2 border-t border-gray-800 items-center"></div>
    </header>

    <main class="max-w-7xl mx-auto p-3 md:p-6 mt-2">
        <div id="cardContainer"></div>
    </main>

    <button onclick="addNewCard()" class="fixed bottom-8 right-6 bg-memo-primary text-white p-4 rounded-2xl shadow-lg active:scale-90 transition-all z-50">
        <i data-lucide="plus" class="w-7 h-7"></i>
    </button>

    <script>
        let currentTabId = 'tab1';
        let appState = {
            data: { tab1: [], tab2: [], tab3: [], tab4: [] },
            tabs: { tab1: 'メイン', tab2: 'Shop I', tab3: 'Shop II', tab4: 'etc' }
        };
        let sortableInstance = null;

        const COLORS = [
            { name: 'white', class: 'bg-card-white' },
            { name: 'red', class: 'bg-card-red' },
            { name: 'orange', class: 'bg-card-orange' },
            { name: 'yellow', class: 'bg-card-yellow' },
            { name: 'green', class: 'bg-card-green' },
            { name: 'teal', class: 'bg-card-teal' },
            { name: 'blue', class: 'bg-card-blue' },
            { name: 'purple', class: 'bg-card-purple' },
            { name: 'gray', class: 'bg-card-gray' }
        ];

        function init() {
            const savedData = localStorage.getItem('memo_pro_final_data');
            const savedTabs = localStorage.getItem('memo_pro_final_tabs');
            if (savedData) appState.data = JSON.parse(savedData);
            if (savedTabs) appState.tabs = JSON.parse(savedTabs);
            renderTabs();
            renderCards();
        }

        function save() {
            localStorage.setItem('memo_pro_final_data', JSON.stringify(appState.data));
            localStorage.setItem('memo_pro_final_tabs', JSON.stringify(appState.tabs));
        }

        function renderTabs() {
            const tabBar = document.getElementById('tabBar');
            tabBar.innerHTML = '';
            Object.keys(appState.tabs).forEach(id => {
                const isActive = currentTabId === id;
                const btn = document.createElement('div');
                btn.className = `tab-btn ${isActive ? 'active' : ''}`;
                
                const span = document.createElement('span');
                span.innerText = appState.tabs[id];
                span.onclick = () => { currentTabId = id; renderTabs(); renderCards(); };
                btn.appendChild(span);

                if (isActive) {
                    const editBtn = document.createElement('button');
                    editBtn.className = "ml-2 opacity-30 hover:opacity-100 p-1";
                    editBtn.innerHTML = '<i data-lucide="pencil" class="w-3 h-3"></i>';
                    editBtn.onclick = (e) => { e.stopPropagation(); renameTab(id); };
                    btn.appendChild(editBtn);
                }
                tabBar.appendChild(btn);
            });
            lucide.createIcons();
        }

        function renameTab(id) {
            const newName = prompt('カテゴリ名を変更:', appState.tabs[id]);
            if (newName && newName.trim()) {
                appState.tabs[id] = newName.trim();
                save();
                renderTabs();
            }
        }

        function renderCards() {
            const container = document.getElementById('cardContainer');
            container.innerHTML = '';
            const cards = appState.data[currentTabId] || [];

            cards.forEach(card => {
                const cardEl = document.createElement('div');
                cardEl.className = `keep-card group ${card.color || 'bg-card-white'}`;
                cardEl.dataset.id = card.id;
                
                cardEl.innerHTML = `
                    <div class="card-inner p-4">
                        <div class="flex items-center justify-between -mt-1 mb-2">
                            <div class="drag-handle p-2 -ml-2 opacity-30 group-hover:opacity-100 transition-opacity">
                                <i data-lucide="grip-horizontal" class="w-5 h-5"></i>
                            </div>
                            <button onclick="deleteCard('${card.id}')" class="opacity-0 group-hover:opacity-40 hover:text-red-500 hover:opacity-100 p-2 -mr-2 transition-all">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                        <div contenteditable="true" class="card-title outline-none text-base mb-3 px-1 block break-all" onblur="updateTitle('${card.id}', this.innerText)">${card.title}</div>
                        <div class="space-y-0.5">
                            ${(card.items || []).map(item => `
                                <div class="item-row flex items-center p-2 -mx-2 rounded-lg cursor-pointer transition-all ${item.checked ? 'checked' : 'hover:bg-white/5'}" onclick="toggleItem('${card.id}', '${item.id}')">
                                    <i data-lucide="${item.checked ? 'check-circle-2' : 'circle'}" class="w-4 h-4 mr-2 ${item.checked ? 'text-memo-primary' : 'opacity-30'}"></i>
                                    <span class="text-sm flex-1 break-all text-gray-100 ${item.checked ? 'checked-text' : ''}">${item.text}</span>
                                    ${item.date ? `<span class="date-badge">${item.date}</span>` : `<button onclick="deleteItem('${card.id}', '${item.id}', event)" class="opacity-0 group-hover:opacity-40 hover:opacity-100 p-1"><i data-lucide="x" class="w-3 h-3"></i></button>`}
                                </div>
                            `).join('')}
                        </div>
                        <div class="mt-3 flex items-center border-b border-white/10 focus-within:border-memo-primary">
                            <input type="text" id="input-${card.id}" placeholder="＋ 追加" class="bg-transparent text-sm w-full py-2 focus:outline-none text-white" onkeydown="if(event.key==='Enter') addItem('${card.id}')">
                        </div>
                        <div class="mt-4 flex gap-1.5 opacity-0 group-hover:opacity-100 transition-opacity overflow-x-auto no-scrollbar pb-1">
                            ${COLORS.map(c => `<div onclick="updateColor('${card.id}', '${c.class}')" class="color-dot ${c.class}"></div>`).join('')}
                        </div>
                    </div>
                `;
                container.appendChild(cardEl);
            });
            
            lucide.createIcons();
            setTimeout(resizeAll, 50);
            initSortable();
        }

        function initSortable() {
            const container = document.getElementById('cardContainer');
            if (sortableInstance) sortableInstance.destroy();

            sortableInstance = new Sortable(container, {
                animation: 250,
                handle: '.drag-handle',
                ghostClass: 'sortable-ghost',
                dragClass: 'sortable-drag',
                forceFallback: false,
                onEnd: () => {
                    const newOrder = Array.from(container.querySelectorAll('.keep-card')).map(el => 
                        appState.data[currentTabId].find(c => c.id === el.dataset.id)
                    );
                    appState.data[currentTabId] = newOrder;
                    save();
                    resizeAll();
                }
            });
        }

        function addNewCard() {
            if (!appState.data[currentTabId]) appState.data[currentTabId] = [];
            const newCard = { id: 'c' + Date.now(), title: '新規リスト', color: 'bg-card-white', items: [] };
            appState.data[currentTabId].unshift(newCard);
            save();
            renderCards();
        }

        function deleteCard(id) {
            if (confirm('このカードを削除しますか？')) {
                appState.data[currentTabId] = appState.data[currentTabId].filter(c => c.id !== id);
                save();
                renderCards();
            }
        }

        function updateTitle(cardId, text) {
            const card = appState.data[currentTabId].find(c => c.id === cardId);
            if (card) { card.title = text || '無題'; save(); }
        }

        function updateColor(cardId, colorClass) {
            const card = appState.data[currentTabId].find(c => c.id === cardId);
            if (card) { card.color = colorClass; save(); renderCards(); }
        }

        function addItem(cardId) {
            const input = document.getElementById(`input-${cardId}`);
            const text = input.value.trim();
            if (text) {
                const card = appState.data[currentTabId].find(c => c.id === cardId);
                const newItem = { id: 'it' + Date.now(), text: text, checked: false };
                const firstChecked = card.items.findIndex(i => i.checked);
                if (firstChecked === -1) card.items.push(newItem);
                else card.items.splice(firstChecked, 0, newItem);
                input.value = '';
                save();
                renderCards();
            }
        }

        function toggleItem(cardId, itemId) {
            const card = appState.data[currentTabId].find(c => c.id === cardId);
            const item = card.items.find(i => i.id === itemId);
            item.checked = !item.checked;
            if (item.checked) {
                const now = new Date();
                item.date = `${now.getMonth() + 1}/${now.getDate()}`;
                item.ts = Date.now();
            } else {
                delete item.date;
                delete item.ts;
            }
            card.items.sort((a, b) => {
                if (a.checked !== b.checked) return a.checked ? 1 : -1;
                if (a.checked) return (a.ts || 0) - (b.ts || 0);
                return 0;
            });
            save();
            renderCards();
        }

        function deleteItem(cardId, itemId, e) {
            e.stopPropagation();
            const card = appState.data[currentTabId].find(c => c.id === cardId);
            card.items = card.items.filter(i => i.id !== itemId);
            save();
            renderCards();
        }

        function resizeAll() {
            const container = document.getElementById('cardContainer');
            const cards = container.querySelectorAll('.keep-card');
            cards.forEach(card => {
                const inner = card.querySelector('.card-inner');
                if (inner) {
                    const contentHeight = inner.getBoundingClientRect().height;
                    card.style.gridRowEnd = "span " + Math.ceil(contentHeight + 16);
                }
            });
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(appState)], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `my-memo-backup-${new Date().toISOString().slice(0,10)}.json`;
            a.click();
        }

        function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = ".json";
            input.onchange = e => {
                const reader = new FileReader();
                reader.onload = ev => {
                    try {
                        const data = JSON.parse(ev.target.result);
                        if (data.data && data.tabs) { 
                            appState = data; 
                            save(); 
                            location.reload(); 
                        }
                    } catch (err) { alert("無効なファイルです"); }
                };
                reader.readAsText(e.target.files[0]);
            };
            input.click();
        }

        window.onload = init;
        window.onresize = resizeAll;
        const observer = new MutationObserver(() => { resizeAll(); });
        observer.observe(document.body, { childList: true, subtree: true, characterData: true });
    </script>
</body>
</html>
