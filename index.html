<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Memo Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
        
        body { 
            font-family: 'Noto Sans JP', sans-serif; 
            background-color: #f1f3f4; 
            color: #202124; 
            -webkit-tap-highlight-color: transparent; 
            touch-action: pan-y;
        }

        #cardContainer {
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            grid-auto-rows: 8px;
            gap: 8px;
        }

        @media (min-width: 768px) {
            #cardContainer {
                grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
                gap: 16px;
            }
        }

        .keep-card { 
            grid-row-end: span 10;
            border-radius: 8px; 
            border: 1px solid #dadce0; 
            transition: box-shadow 0.2s; 
            background-color: #ffffff;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: fit-content;
            user-select: none;
        }

        .keep-card:hover { 
            box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15); 
        }

        .drag-handle { 
            cursor: grab; 
            padding: 2px;
            color: #bdc1c6;
        }

        .item-row { 
            display: flex; 
            align-items: flex-start; 
            padding: 4px 0; 
            cursor: pointer; 
            position: relative; 
        }

        .checked-text { 
            text-decoration: line-through; 
            color: #80868b; 
            opacity: 0.7;
        }

        .tab-btn { 
            padding: 12px 14px; 
            font-weight: 500; 
            color: #5f6368; 
            border-bottom: 2px solid transparent;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: all 0.2s;
        }

        .tab-btn.active { 
            color: #202124; 
            border-bottom: 2px solid #f97316;
            background-color: rgba(249, 115, 22, 0.05);
        }

        .color-dot { 
            width: 20px; 
            height: 20px; 
            border-radius: 50%; 
            border: 1px solid rgba(0,0,0,0.1); 
        }

        #undoToast { 
            transform: translateY(150%); 
            transition: transform 0.3s ease; 
            z-index: 100; 
        }
        #undoToast.show { transform: translateY(0); }

        .no-scrollbar::-webkit-scrollbar { display: none; }

        .bg-white { background-color: #ffffff; }
        .bg-red { background-color: #f28b82; }
        .bg-orange { background-color: #fbbc04; }
        .bg-yellow { background-color: #fff475; }
        .bg-green { background-color: #ccff90; }
        .bg-teal { background-color: #a7ffeb; }
        .bg-blue { background-color: #cbf0f8; }
        .bg-darkblue { background-color: #aecbfa; }
        .bg-purple { background-color: #d7aefb; }
        .bg-pink { background-color: #fdcfe8; }
        .bg-brown { background-color: #e6c9a8; }
        .bg-gray { background-color: #e8eaed; }

        [contenteditable]:focus {
            outline: none;
            background: rgba(0,0,0,0.03);
            border-radius: 4px;
        }
    </style>
</head>
<body class="pb-32">

    <header class="bg-white sticky top-0 z-50 border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 flex items-center h-14">
            <div class="flex items-center space-x-2 flex-1">
                <div class="bg-orange-500 p-1.5 rounded text-white">
                    <i data-lucide="sticky-note" class="w-5 h-5"></i>
                </div>
                <h1 class="text-lg font-medium text-gray-700">Memo Pro</h1>
            </div>
            
            <div class="flex items-center space-x-1">
                <button onclick="exportData()" class="p-2 text-gray-500 rounded-full">
                    <i data-lucide="download" class="w-5 h-5"></i>
                </button>
                <button onclick="importData()" class="p-2 text-gray-500 rounded-full">
                    <i data-lucide="upload" class="w-5 h-5"></i>
                </button>
            </div>
        </div>
        
        <div id="tabBar" class="flex bg-white overflow-x-auto no-scrollbar border-t border-gray-100 px-2">
            <!-- Tabs will be rendered here -->
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-2 md:p-4">
        <div id="cardContainer"></div>
    </main>

    <div id="undoToast" class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md">
        <div class="bg-gray-800 text-white px-4 py-3 rounded shadow-xl flex items-center justify-between">
            <span class="text-xs" id="toastMessage">変更されました</span>
            <button onclick="undo()" class="text-yellow-400 font-bold text-xs">元に戻す</button>
        </div>
    </div>

    <button onclick="addNewCard()" class="fixed bottom-6 right-6 bg-white text-gray-700 p-4 rounded-full shadow-lg active:scale-95 z-40 border border-gray-200">
        <i data-lucide="plus" class="w-7 h-7 text-orange-500"></i>
    </button>

    <script>
        let currentTabId = 'tab1';
        let appData = {};
        let tabNames = { tab1: 'メイン', tab2: '店舗別', tab3: '予備', tab4: 'おすすめ' };
        let history = [];
        let sortableInstance = null;

        const COLORS = [
            { name: 'white', class: 'bg-white' },
            { name: 'red', class: 'bg-red' },
            { name: 'orange', class: 'bg-orange' },
            { name: 'yellow', class: 'bg-yellow' },
            { name: 'green', class: 'bg-green' },
            { name: 'teal', class: 'bg-teal' },
            { name: 'blue', class: 'bg-blue' },
            { name: 'darkblue', class: 'bg-darkblue' },
            { name: 'purple', class: 'bg-purple' },
            { name: 'pink', class: 'bg-pink' },
            { name: 'brown', class: 'bg-brown' },
            { name: 'gray', class: 'bg-gray' }
        ];

        const initialData = {
            'tab1': [
                { id: 'm1', title: '買い物', color: 'bg-white', items: [{text: '卵', checked: false}, {text: '牛乳', checked: false}] },
            ],
            'tab2': [], 'tab3': [], 'tab4': []
        };

        function init() {
            const localData = localStorage.getItem('memo_pro_v4_data');
            const localTabs = localStorage.getItem('memo_pro_v4_tabs');
            
            appData = localData ? JSON.parse(localData) : initialData;
            if (localTabs) tabNames = JSON.parse(localTabs);
            
            renderTabs();
            renderCards();
        }

        function renderTabs() {
            const tabBar = document.getElementById('tabBar');
            tabBar.innerHTML = '';
            
            Object.keys(tabNames).forEach(id => {
                const isActive = currentTabId === id;
                const btn = document.createElement('div');
                btn.className = `tab-btn whitespace-nowrap ${isActive ? 'active' : ''}`;
                
                // テキスト部分
                const span = document.createElement('span');
                span.innerText = tabNames[id];
                span.onclick = () => switchTab(id);
                btn.appendChild(span);

                // アクティブな時だけ編集アイコンを表示
                if (isActive) {
                    const editIcon = document.createElement('button');
                    editIcon.className = "ml-1 p-1 hover:bg-black/5 rounded";
                    editIcon.innerHTML = `<i data-lucide="edit-3" class="w-3 h-3 text-orange-600"></i>`;
                    editIcon.onclick = (e) => {
                        e.stopPropagation();
                        renameTab(id);
                    };
                    btn.appendChild(editIcon);
                }

                tabBar.appendChild(btn);
            });
            lucide.createIcons();
        }

        function renameTab(id) {
            // Android等でダイアログが出ないのを防ぐため、確実に実行
            setTimeout(() => {
                const oldName = tabNames[id];
                const newName = window.prompt('カテゴリ名を変更します', oldName);
                if (newName !== null && newName.trim() !== '') {
                    tabNames[id] = newName.trim();
                    localStorage.setItem('memo_pro_v4_tabs', JSON.stringify(tabNames));
                    renderTabs();
                }
            }, 50);
        }

        function switchTab(id) {
            currentTabId = id;
            renderTabs();
            renderCards();
        }

        function initSortable() {
            const container = document.getElementById('cardContainer');
            if (sortableInstance) sortableInstance.destroy();

            sortableInstance = new Sortable(container, {
                animation: 250,
                handle: '.drag-handle',
                ghostClass: 'opacity-0',
                onEnd: () => {
                    const newOrder = [];
                    container.querySelectorAll('.keep-card').forEach(cardEl => {
                        const c = findCard(cardEl.dataset.id);
                        if(c) newOrder.push(c);
                    });
                    appData[currentTabId] = newOrder;
                    save();
                }
            });
        }

        function save() {
            localStorage.setItem('memo_pro_v4_data', JSON.stringify(appData));
            resizeAllCards();
        }

        function recordAction() {
            history.push(JSON.stringify(appData));
            if (history.length > 10) history.shift();
        }

        function showToast(msg) {
            const toast = document.getElementById('undoToast');
            document.getElementById('toastMessage').innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        window.undo = () => {
            if (history.length === 0) return;
            appData = JSON.parse(history.pop());
            save();
            renderCards();
            document.getElementById('undoToast').classList.remove('show');
        };

        window.updateTitle = (cardId, newTitle) => {
            const card = findCard(cardId);
            if (card && card.title !== newTitle) {
                recordAction();
                card.title = newTitle;
                save();
            }
        };

        window.toggleItem = (cardId, idx) => {
            const card = findCard(cardId);
            const item = card.items[idx];
            item.checked = !item.checked;
            card.items.sort((a,b) => (a.checked === b.checked) ? 0 : a.checked ? 1 : -1);
            save();
            renderCards();
        };

        window.deleteItem = (cardId, idx, event) => {
            event.stopPropagation();
            recordAction();
            const card = findCard(cardId);
            card.items.splice(idx, 1);
            save();
            renderCards();
        };

        window.addItem = (cardId, input, event) => {
            if (event.key === 'Enter' && input.value.trim()) {
                const card = findCard(cardId);
                card.items.push({ text: input.value.trim(), checked: false });
                input.value = '';
                save();
                renderCards();
            }
        };

        window.updateColor = (cardId, colorClass) => {
            const card = findCard(cardId);
            card.color = colorClass;
            save();
            renderCards();
        };

        window.deleteCard = (cardId) => {
            if (confirm("メモを削除しますか？")) {
                recordAction();
                appData[currentTabId] = appData[currentTabId].filter(c => c.id !== cardId);
                save();
                renderCards();
            }
        };

        window.addNewCard = () => {
            const id = 'id' + Date.now();
            if(!appData[currentTabId]) appData[currentTabId] = [];
            appData[currentTabId].unshift({ id: id, title: '新規', color: 'bg-white', items: [] });
            save();
            renderCards();
            setTimeout(() => {
                const el = document.querySelector(`[data-id="${id}"] .card-title`);
                if(el) el.focus();
            }, 100);
        };

        function findCard(id) {
            for (let tab in appData) {
                const found = appData[tab].find(c => c.id === id);
                if (found) return found;
            }
        }

        function resizeCard(card) {
            const rowHeight = 8;
            const gap = 8;
            const content = card.querySelector('.card-content');
            if(!content) return;
            const contentHeight = content.getBoundingClientRect().height;
            const rowSpan = Math.ceil((contentHeight + gap) / rowHeight);
            card.style.gridRowEnd = `span ${rowSpan}`;
        }

        function resizeAllCards() {
            const allCards = document.getElementsByClassName('keep-card');
            for (let card of allCards) {
                resizeCard(card);
            }
        }

        function renderCards() {
            const container = document.getElementById('cardContainer');
            if (!container) return;
            container.innerHTML = '';
            
            (appData[currentTabId] || []).forEach(card => {
                const el = document.createElement('div');
                el.className = `keep-card group ${card.color}`;
                el.dataset.id = card.id;
                el.innerHTML = `
                    <div class="card-content p-2 md:p-3">
                        <div class="flex items-start mb-2">
                            <div class="drag-handle mr-0.5 mt-0.5"><i data-lucide="grip-vertical" class="w-4 h-4"></i></div>
                            <div contenteditable="true" class="card-title font-bold text-sm md:text-base text-gray-800 flex-1 outline-none break-all" onblur="updateTitle('${card.id}', this.innerText)">${card.title}</div>
                            <button onclick="deleteCard('${card.id}')" class="text-gray-400 hover:text-red-500 ml-1"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
                        </div>
                        <div class="space-y-0.5 min-h-[5px]">
                            ${card.items.map((it, i) => `
                                <div class="item-row" onclick="toggleItem('${card.id}', ${i})">
                                    <i data-lucide="${it.checked ? 'check-square' : 'square'}" class="w-3.5 h-3.5 mt-0.5 mr-2 flex-shrink-0 text-gray-400"></i>
                                    <span class="text-xs md:text-sm flex-1 break-all ${it.checked ? 'checked-text' : 'text-gray-700'}">${it.text}</span>
                                    <button onclick="deleteItem('${card.id}', ${i}, event)" class="text-gray-300 ml-1"><i data-lucide="x" class="w-3 h-3"></i></button>
                                </div>
                            `).join('')}
                        </div>
                        <div class="mt-2">
                            <input type="text" placeholder="＋ 追加" class="w-full bg-transparent text-xs py-1 focus:outline-none placeholder-gray-400 border-b border-transparent focus:border-gray-200" onkeydown="addItem('${card.id}', this, event)">
                        </div>
                        <div class="mt-3 flex flex-wrap gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                            ${COLORS.map(c => `<div onclick="updateColor('${card.id}', '${c.class}')" class="color-dot ${c.class}"></div>`).join('')}
                        </div>
                    </div>
                `;
                container.appendChild(el);
            });
            lucide.createIcons();
            setTimeout(resizeAllCards, 50);
            initSortable();
        }

        window.exportData = () => {
            const dataStr = JSON.stringify({ data: appData, tabs: tabNames }, null, 2);
            const blob = new Blob([dataStr], {type: "application/json"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `memo_backup.json`;
            a.click();
        };

        window.importData = () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = e => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = event => {
                    try {
                        const imported = JSON.parse(event.target.result);
                        if (imported.data && imported.tabs) { appData = imported.data; tabNames = imported.tabs; }
                        else { appData = imported; }
                        save();
                        localStorage.setItem('memo_pro_v4_tabs', JSON.stringify(tabNames));
                        renderTabs(); renderCards();
                    } catch(err) { alert("エラー"); }
                };
                reader.readAsText(file);
            };
            input.click();
        };

        window.addEventListener('resize', resizeAllCards);
        window.onload = init;
    </script>
</body>
</html>
