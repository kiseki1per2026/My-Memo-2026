<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Memo Pro - Refined</title>
    
    <meta name="theme-color" content="#f97316">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'media',
            theme: {
                extend: {
                    colors: {
                        orange: { 500: '#f97316', 600: '#ea580c' }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
        
        body { 
            font-family: 'Noto Sans JP', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            touch-action: pan-y;
        }

        #cardContainer {
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            grid-auto-rows: 8px;
            gap: 12px;
        }

        @media (min-width: 768px) {
            #cardContainer {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                gap: 20px;
            }
        }

        .keep-card { 
            grid-row-end: span 10;
            border-radius: 20px;
            transition: all 0.3s ease; 
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: fit-content;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0,0,0,0.05);
        }

        .drag-handle { cursor: grab; padding: 8px; opacity: 0.3; }

        /* チェック済みのスタイル（視覚的変化） */
        .item-row.checked { 
            background-color: rgba(0, 0, 0, 0.03) !important; 
            opacity: 0.6;
        }
        .checked-text { text-decoration: line-through; color: #9ca3af; }
        
        .date-badge { 
            font-size: 0.7rem; 
            font-weight: bold;
            padding: 2px 6px; 
            border-radius: 6px; 
            background: #f97316; 
            color: white;
            margin-left: auto;
            flex-shrink: 0;
        }

        .tab-btn { 
            padding: 14px 18px; 
            font-weight: 500; 
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 3px solid transparent;
        }

        .tab-btn.active { 
            color: #f97316; 
            border-bottom: 3px solid #f97316;
            background-color: rgba(249, 115, 22, 0.05);
        }

        .color-dot { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 1px solid rgba(0,0,0,0.1); }

        /* カラーバリエーション */
        .bg-white { background-color: #ffffff; color: #1f2937; }
        .bg-red { background-color: #fee2e2; color: #7f1d1d; }
        .bg-orange { background-color: #ffedd5; color: #9a3412; }
        .bg-yellow { background-color: #fef9c3; color: #854d0e; }
        .bg-green { background-color: #dcfce7; color: #166534; }
        .bg-teal { background-color: #ccfbf1; color: #115e59; }
        .bg-blue { background-color: #dbeafe; color: #1e3a8a; }
        .bg-purple { background-color: #f3e8ff; color: #581c87; }
        .bg-gray { background-color: #f3f4f6; color: #1f2937; }

        @media (prefers-color-scheme: dark) {
            .bg-white { background-color: #1f2937; color: #f3f4f6; }
            .bg-red { background-color: #450a0a; color: #fecaca; }
            .bg-green { background-color: #052e16; color: #bbf7d0; }
            .bg-blue { background-color: #172554; color: #bfdbfe; }
            .bg-gray { background-color: #111827; color: #e5e7eb; }
            .item-row.checked { background-color: rgba(255, 255, 255, 0.05) !important; }
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 pb-24 transition-colors">

    <header class="bg-white/90 dark:bg-gray-800/90 backdrop-blur-md sticky top-0 z-50 border-b border-gray-200 dark:border-gray-700">
        <div class="max-w-7xl mx-auto px-4 flex items-center h-14">
            <div class="flex items-center space-x-2 flex-1">
                <div class="bg-orange-500 p-1.5 rounded-lg text-white">
                    <i data-lucide="check-square" class="w-5 h-5"></i>
                </div>
                <h1 class="font-bold text-lg">My Memo Pro</h1>
            </div>
            <div class="flex space-x-1">
                <button onclick="exportData()" class="p-2 text-gray-400 hover:text-orange-500"><i data-lucide="download" class="w-5 h-5"></i></button>
                <button onclick="importData()" class="p-2 text-gray-400 hover:text-orange-500"><i data-lucide="upload" class="w-5 h-5"></i></button>
            </div>
        </div>
        <div id="tabBar" class="flex overflow-x-auto no-scrollbar px-2 border-t border-gray-50 dark:border-gray-700"></div>
    </header>

    <main class="max-w-7xl mx-auto p-3 md:p-6 mt-2">
        <div id="cardContainer"></div>
    </main>

    <button onclick="addNewCard()" class="fixed bottom-6 right-6 bg-orange-500 text-white p-4 rounded-2xl shadow-lg active:scale-95 transition-all z-40">
        <i data-lucide="plus" class="w-7 h-7"></i>
    </button>

    <script>
        let currentTabId = 'tab1';
        let appData = {};
        let tabNames = { tab1: 'メイン', tab2: '店舗別', tab3: '予備', tab4: 'リスト' };

        const COLORS = [
            { name: 'white', class: 'bg-white' }, { name: 'red', class: 'bg-red' },
            { name: 'orange', class: 'bg-orange' }, { name: 'yellow', class: 'bg-yellow' },
            { name: 'green', class: 'bg-green' }, { name: 'teal', class: 'bg-teal' },
            { name: 'blue', class: 'bg-blue' }, { name: 'purple', class: 'bg-purple' },
            { name: 'gray', class: 'bg-gray' }
        ];

        function init() {
            const localData = localStorage.getItem('memo_pro_v8_data');
            const localTabs = localStorage.getItem('memo_pro_v8_tabs');
            appData = localData ? JSON.parse(localData) : { tab1: [], tab2: [], tab3: [], tab4: [] };
            if (localTabs) tabNames = JSON.parse(localTabs);
            renderTabs();
            renderCards();
        }

        function save() {
            localStorage.setItem('memo_pro_v8_data', JSON.stringify(appData));
            resizeAllCards();
        }

        function renderTabs() {
            const tabBar = document.getElementById('tabBar');
            tabBar.innerHTML = '';
            Object.keys(tabNames).forEach(id => {
                const isActive = currentTabId === id;
                const btn = document.createElement('div');
                btn.className = `tab-btn ${isActive ? 'active' : 'opacity-50'}`;
                btn.innerHTML = `<span onclick="switchTab('${id}')">${tabNames[id]}</span>`;
                if (isActive) {
                    const edit = document.createElement('button');
                    edit.className = "ml-2 opacity-50";
                    edit.innerHTML = `<i data-lucide="pencil" class="w-3 h-3"></i>`;
                    edit.onclick = () => renameTab(id);
                    btn.appendChild(edit);
                }
                tabBar.appendChild(btn);
            });
            lucide.createIcons();
        }

        function renameTab(id) {
            const name = prompt('名前を変更', tabNames[id]);
            if (name) { tabNames[id] = name; localStorage.setItem('memo_pro_v8_tabs', JSON.stringify(tabNames)); renderTabs(); }
        }

        function switchTab(id) { currentTabId = id; renderTabs(); renderCards(); }

        window.toggleItem = (cardId, itemId) => {
            const card = findCard(cardId);
            const item = card.items.find(it => it.id === itemId);
            item.checked = !item.checked;
            
            if (item.checked) {
                const now = new Date();
                item.date = `${now.getMonth()+1}/${now.getDate()}`;
                item.timestamp = Date.now(); // 並び替え用の隠し時間
            } else {
                delete item.date;
                delete item.timestamp;
            }

            // 並び替えロジック
            // 1. 未完了のもの（上）
            // 2. 完了したもの（下：完了した順に下へ積み重なる＝最新の完了が一番下）
            card.items.sort((a, b) => {
                if (a.checked !== b.checked) return a.checked ? 1 : -1;
                if (a.checked && b.checked) return (a.timestamp || 0) - (b.timestamp || 0);
                return 0; // 未完了同士はそのまま
            });

            save();
            renderCards();
        };

        window.addItem = (cardId) => {
            const input = document.getElementById(`input-${cardId}`);
            const text = input.value.trim();
            if (text) {
                const card = findCard(cardId);
                // 新しい項目は未完了リストの最後（完了済み項目の手前）に差し込む
                const newItem = { id: 'it'+Date.now(), text: text, checked: false };
                const firstCheckedIdx = card.items.findIndex(it => it.checked);
                if (firstCheckedIdx === -1) card.items.push(newItem);
                else card.items.splice(firstCheckedIdx, 0, newItem);
                input.value = '';
                save();
                renderCards();
                input.focus();
            }
        };

        window.deleteItem = (cardId, itemId, e) => {
            e.stopPropagation();
            const card = findCard(cardId);
            card.items = card.items.filter(it => it.id !== itemId);
            save();
            renderCards();
        };

        window.updateTitle = (cardId, val) => { findCard(cardId).title = val; save(); };
        window.updateColor = (cardId, color) => { findCard(cardId).color = color; save(); renderCards(); };
        window.deleteCard = (cardId) => { if(confirm('削除しますか？')) { appData[currentTabId] = appData[currentTabId].filter(c => c.id !== cardId); save(); renderCards(); } };

        window.addNewCard = () => {
            const id = 'c'+Date.now();
            appData[currentTabId].unshift({ id: id, title: '新規メモ', color: 'bg-white', items: [] });
            save();
            renderCards();
        };

        function findCard(id) { return appData[currentTabId].find(c => c.id === id); }

        function renderCards() {
            const container = document.getElementById('cardContainer');
            container.innerHTML = '';
            (appData[currentTabId] || []).forEach(card => {
                const div = document.createElement('div');
                div.className = `keep-card group ${card.color}`;
                div.dataset.id = card.id;
                div.innerHTML = `
                    <div class="card-content p-4">
                        <div class="flex items-center mb-2">
                            <div class="drag-handle -ml-2"><i data-lucide="grip-vertical" class="w-4 h-4"></i></div>
                            <div contenteditable="true" class="font-bold flex-1 outline-none" onblur="updateTitle('${card.id}', this.innerText)">${card.title}</div>
                            <button onclick="deleteCard('${card.id}')" class="opacity-0 group-hover:opacity-50 hover:text-red-500 transition-opacity"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                        <div class="space-y-0.5">
                            ${card.items.map(it => `
                                <div class="item-row flex items-center p-2 -mx-1 rounded-lg cursor-pointer transition-all ${it.checked ? 'checked' : ''}" onclick="toggleItem('${card.id}', '${it.id}')">
                                    <i data-lucide="${it.checked ? 'check-circle' : 'circle'}" class="w-4 h-4 mr-2 ${it.checked ? 'text-orange-500' : 'opacity-30'}"></i>
                                    <span class="text-sm flex-1 break-all ${it.checked ? 'checked-text' : ''}">${it.text}</span>
                                    ${it.date ? `<span class="date-badge">${it.date}</span>` : `<button onclick="deleteItem('${card.id}', '${it.id}', event)" class="opacity-0 group-hover:opacity-50 p-1"><i data-lucide="x" class="w-3 h-3"></i></button>`}
                                </div>
                            `).join('')}
                        </div>
                        <div class="mt-3 flex items-center border-b border-black/5 dark:border-white/5 focus-within:border-orange-500">
                            <input type="text" id="input-${card.id}" placeholder="＋ 追加" class="bg-transparent text-sm w-full py-1 focus:outline-none" onkeydown="if(event.key==='Enter') addItem('${card.id}')">
                        </div>
                        <div class="mt-3 flex gap-1.5 opacity-0 group-hover:opacity-100 transition-opacity overflow-x-auto no-scrollbar pb-1">
                            ${COLORS.map(c => `<div onclick="updateColor('${card.id}', '${c.class}')" class="color-dot ${c.class}"></div>`).join('')}
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
            lucide.createIcons();
            setTimeout(resizeAllCards, 50);
            new Sortable(container, { animation: 200, handle: '.drag-handle', onEnd: () => {
                const newOrder = Array.from(container.querySelectorAll('.keep-card')).map(el => findCard(el.dataset.id));
                appData[currentTabId] = newOrder;
                save();
            }});
        }

        function resizeAllCards() {
            document.querySelectorAll('.keep-card').forEach(card => {
                const height = card.querySelector('.card-content').getBoundingClientRect().height;
                card.style.gridRowEnd = `span ${Math.ceil((height + 12) / 8)}`;
            });
        }

        window.exportData = () => {
            const blob = new Blob([JSON.stringify({ data: appData, tabs: tabNames })], {type: "application/json"});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `memo.json`; a.click();
        };

        window.importData = () => {
            const input = document.createElement('input'); input.type = 'file';
            input.onchange = e => {
                const reader = new FileReader();
                reader.onload = ev => {
                    const res = JSON.parse(ev.target.result);
                    appData = res.data; tabNames = res.tabs;
                    save(); renderTabs(); renderCards();
                };
                reader.readAsText(e.target.files[0]);
            };
            input.click();
        };

        window.onload = init;
        window.onresize = resizeAllCards;
    </script>
</body>
</html>
