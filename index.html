<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Memo Pro</title>
    
    <!-- PWA & Mobile Meta -->
    <meta name="theme-color" content="#f97316">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/564/564445.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'media', // スマホの設定に合わせて自動でダークモード切替
            theme: {
                extend: {
                    colors: {
                        orange: { 500: '#f97316', 600: '#ea580c' }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
        
        body { 
            font-family: 'Noto Sans JP', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            touch-action: pan-y;
        }

        #cardContainer {
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            grid-auto-rows: 8px;
            gap: 12px;
        }

        @media (min-width: 768px) {
            #cardContainer {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                gap: 20px;
            }
        }

        .keep-card { 
            grid-row-end: span 10;
            border-radius: 20px; /* 丸みを強調 */
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: fit-content;
            user-select: none;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0,0,0,0.05);
        }

        .keep-card:hover { 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            transform: translateY(-2px); /* ホバー時に少し浮く */
        }

        .drag-handle { cursor: grab; padding: 8px; opacity: 0.4; transition: opacity 0.2s; }
        .drag-handle:hover { opacity: 1; }

        .checked-text { text-decoration: line-through; opacity: 0.5; }

        .tab-btn { 
            padding: 14px 18px; 
            font-weight: 500; 
            border-bottom: 3px solid transparent;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 12px 12px 0 0;
            margin: 0 4px;
        }

        .tab-btn.active { 
            color: #f97316; 
            border-bottom: 3px solid #f97316;
            background-color: rgba(249, 115, 22, 0.08);
        }

        .color-dot { 
            width: 24px; height: 24px; 
            border-radius: 50%; 
            border: 2px solid rgba(0,0,0,0.05); 
            cursor: pointer;
            transition: transform 0.2s;
        }
        .color-dot:hover { transform: scale(1.2); }

        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* モダンなカラーパレット (ライト/ダーク両対応) */
        .bg-white { background-color: #ffffff; color: #1f2937; }
        .bg-red { background-color: #fee2e2; color: #7f1d1d; }
        .bg-orange { background-color: #ffedd5; color: #9a3412; }
        .bg-yellow { background-color: #fef9c3; color: #854d0e; }
        .bg-green { background-color: #dcfce7; color: #166534; }
        .bg-teal { background-color: #ccfbf1; color: #115e59; }
        .bg-blue { background-color: #dbeafe; color: #1e3a8a; }
        .bg-darkblue { background-color: #e0e7ff; color: #3730a3; }
        .bg-purple { background-color: #f3e8ff; color: #581c87; }
        .bg-pink { background-color: #fce7f3; color: #831843; }
        .bg-brown { background-color: #f5f5f4; color: #44403c; }
        .bg-gray { background-color: #f3f4f6; color: #1f2937; }

        @media (prefers-color-scheme: dark) {
            .keep-card { border: 1px solid rgba(255,255,255,0.05); }
            .bg-white { background-color: #1f2937; color: #f3f4f6; }
            .bg-red { background-color: #450a0a; color: #fecaca; }
            .bg-orange { background-color: #431407; color: #fed7aa; }
            .bg-yellow { background-color: #422006; color: #fef08a; }
            .bg-green { background-color: #052e16; color: #bbf7d0; }
            .bg-teal { background-color: #042f2e; color: #99f6e4; }
            .bg-blue { background-color: #172554; color: #bfdbfe; }
            .bg-darkblue { background-color: #1e1b4b; color: #c7d2fe; }
            .bg-purple { background-color: #3b0764; color: #e9d5ff; }
            .bg-pink { background-color: #500724; color: #fbcfe8; }
            .bg-brown { background-color: #1c1917; color: #d6d3d1; }
            .bg-gray { background-color: #111827; color: #e5e7eb; }
        }

        [contenteditable]:focus {
            outline: none;
            background: rgba(0,0,0,0.05);
            border-radius: 8px;
            padding: 0 4px;
            margin: 0 -4px;
        }
        @media (prefers-color-scheme: dark) {
            [contenteditable]:focus { background: rgba(255,255,255,0.1); }
        }
    </style>
</head>
<body class="pb-32 bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-100 transition-colors duration-300">

    <!-- ヘッダー（すりガラス効果つき） -->
    <header class="bg-white/80 dark:bg-gray-800/80 backdrop-blur-md sticky top-0 z-50 border-b border-gray-200 dark:border-gray-700 transition-colors">
        <div class="max-w-7xl mx-auto px-4 flex items-center h-16">
            <div class="flex items-center space-x-3 flex-1">
                <div class="bg-gradient-to-br from-orange-400 to-orange-600 p-2 rounded-xl text-white shadow-md">
                    <i data-lucide="sticky-note" class="w-6 h-6"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight">Memo Pro</h1>
            </div>
            
            <div class="flex items-center space-x-2">
                <button onclick="exportData()" class="p-2.5 text-gray-500 hover:text-orange-500 hover:bg-orange-50 dark:hover:bg-gray-700 rounded-full transition-colors" title="保存">
                    <i data-lucide="download" class="w-5 h-5"></i>
                </button>
                <button onclick="importData()" class="p-2.5 text-gray-500 hover:text-orange-500 hover:bg-orange-50 dark:hover:bg-gray-700 rounded-full transition-colors" title="復元">
                    <i data-lucide="upload" class="w-5 h-5"></i>
                </button>
            </div>
        </div>
        
        <div id="tabBar" class="flex overflow-x-auto no-scrollbar pt-2 px-2 border-t border-gray-100 dark:border-gray-700"></div>
    </header>

    <main class="max-w-7xl mx-auto p-3 md:p-6 mt-2">
        <div id="cardContainer"></div>
    </main>

    <!-- 大きくて押しやすい追加ボタン -->
    <button onclick="addNewCard()" class="fixed bottom-8 right-8 bg-gradient-to-r from-orange-500 to-orange-600 text-white p-5 rounded-2xl shadow-xl hover:shadow-2xl hover:-translate-y-1 active:scale-95 transition-all z-40">
        <i data-lucide="plus" class="w-8 h-8"></i>
    </button>

    <script>
        let currentTabId = 'tab1';
        let appData = {};
        let tabNames = { tab1: 'メイン', tab2: '店舗別', tab3: '予備', tab4: 'おすすめ' };
        let sortableInstance = null;

        const COLORS = [
            { name: 'white', class: 'bg-white' }, { name: 'red', class: 'bg-red' },
            { name: 'orange', class: 'bg-orange' }, { name: 'yellow', class: 'bg-yellow' },
            { name: 'green', class: 'bg-green' }, { name: 'teal', class: 'bg-teal' },
            { name: 'blue', class: 'bg-blue' }, { name: 'darkblue', class: 'bg-darkblue' },
            { name: 'purple', class: 'bg-purple' }, { name: 'pink', class: 'bg-pink' },
            { name: 'brown', class: 'bg-brown' }, { name: 'gray', class: 'bg-gray' }
        ];

        const initialData = {
            'tab1': [{ id: 'm1', title: '歓迎！', color: 'bg-white', items: [{text: '項目をタップで完了', checked: false}, {text: '右下の＋ボタンでメモ追加', checked: false}] }],
            'tab2': [], 'tab3': [], 'tab4': []
        };

        function init() {
            // ここでLocalStorage（スマホ内保存）からデータを読み込んでいます
            const localData = localStorage.getItem('memo_pro_v6_data');
            const localTabs = localStorage.getItem('memo_pro_v6_tabs');
            appData = localData ? JSON.parse(localData) : initialData;
            if (localTabs) tabNames = JSON.parse(localTabs);
            renderTabs();
            renderCards();
        }

        function renderTabs() {
            const tabBar = document.getElementById('tabBar');
            tabBar.innerHTML = '';
            Object.keys(tabNames).forEach(id => {
                const isActive = currentTabId === id;
                const btn = document.createElement('div');
                btn.className = `tab-btn whitespace-nowrap opacity-70 hover:opacity-100 ${isActive ? 'active opacity-100' : ''}`;
                
                const span = document.createElement('span');
                span.innerText = tabNames[id];
                span.onclick = () => switchTab(id);
                btn.appendChild(span);
                
                if (isActive) {
                    const editIcon = document.createElement('button');
                    editIcon.className = "ml-2 p-1.5 hover:bg-black/10 dark:hover:bg-white/10 rounded-full transition-colors";
                    editIcon.innerHTML = `<i data-lucide="edit-3" class="w-3.5 h-3.5"></i>`;
                    editIcon.onclick = (e) => { e.stopPropagation(); renameTab(id); };
                    btn.appendChild(editIcon);
                }
                tabBar.appendChild(btn);
            });
            lucide.createIcons();
        }

        function renameTab(id) {
            setTimeout(() => {
                const newName = window.prompt('カテゴリ名を変更', tabNames[id]);
                if (newName && newName.trim()) {
                    tabNames[id] = newName.trim();
                    localStorage.setItem('memo_pro_v6_tabs', JSON.stringify(tabNames));
                    renderTabs();
                }
            }, 50);
        }

        function switchTab(id) {
            currentTabId = id;
            renderTabs();
            renderCards();
        }

        function initSortable() {
            const container = document.getElementById('cardContainer');
            if (sortableInstance) sortableInstance.destroy();
            sortableInstance = new Sortable(container, {
                animation: 250,
                handle: '.drag-handle',
                ghostClass: 'opacity-50',
                onEnd: () => {
                    const newOrder = [];
                    container.querySelectorAll('.keep-card').forEach(cardEl => {
                        const c = findCard(cardEl.dataset.id);
                        if(c) newOrder.push(c);
                    });
                    appData[currentTabId] = newOrder;
                    save();
                }
            });
        }

        // データを保存する関数（毎回呼ばれます）
        function save() {
            localStorage.setItem('memo_pro_v6_data', JSON.stringify(appData));
            resizeAllCards();
        }

        window.updateTitle = (cardId, newTitle) => {
            const card = findCard(cardId);
            if (card && card.title !== newTitle) {
                card.title = newTitle;
                save();
            }
        };

        window.toggleItem = (cardId, idx) => {
            const card = findCard(cardId);
            card.items[idx].checked = !card.items[idx].checked;
            card.items.sort((a,b) => (a.checked === b.checked) ? 0 : a.checked ? 1 : -1);
            save();
            renderCards();
        };

        window.deleteItem = (cardId, idx, event) => {
            event.stopPropagation();
            findCard(cardId).items.splice(idx, 1);
            save();
            renderCards();
        };

        window.addItem = (cardId) => {
            const input = document.getElementById(`input-${cardId}`);
            const text = input.value.trim();
            if (text) {
                const card = findCard(cardId);
                card.items.push({ text: text, checked: false });
                input.value = '';
                save();
                renderCards();
                setTimeout(() => document.getElementById(`input-${cardId}`).focus(), 50);
            }
        };

        window.updateColor = (cardId, colorClass) => {
            findCard(cardId).color = colorClass;
            save();
            renderCards();
        };

        window.deleteCard = (cardId) => {
            if (confirm("このメモを削除しますか？")) {
                appData[currentTabId] = appData[currentTabId].filter(c => c.id !== cardId);
                save();
                renderCards();
            }
        };

        window.addNewCard = () => {
            const id = 'id' + Date.now();
            if(!appData[currentTabId]) appData[currentTabId] = [];
            appData[currentTabId].unshift({ id: id, title: '新規メモ', color: 'bg-white', items: [] });
            save();
            renderCards();
            setTimeout(() => document.querySelector(`[data-id="${id}"] .card-title`).focus(), 100);
        };

        function findCard(id) {
            for (let tab in appData) {
                const found = appData[tab].find(c => c.id === id);
                if (found) return found;
            }
        }

        function resizeCard(card) {
            const rowHeight = 8;
            const content = card.querySelector('.card-content');
            if(!content) return;
            const contentHeight = content.getBoundingClientRect().height;
            card.style.gridRowEnd = `span ${Math.ceil((contentHeight + 8) / rowHeight)}`;
        }

        function resizeAllCards() {
            Array.from(document.getElementsByClassName('keep-card')).forEach(resizeCard);
        }

        function renderCards() {
            const container = document.getElementById('cardContainer');
            if (!container) return;
            container.innerHTML = '';
            
            (appData[currentTabId] || []).forEach(card => {
                const el = document.createElement('div');
                el.className = `keep-card group ${card.color}`;
                el.dataset.id = card.id;
                
                // カード内のデザインも大きくモダンに刷新
                el.innerHTML = `
                    <div class="card-content p-4 md:p-5">
                        <div class="flex items-start mb-3 gap-1">
                            <div class="drag-handle -ml-2 -mt-2"><i data-lucide="grip-horizontal" class="w-5 h-5"></i></div>
                            <div contenteditable="true" class="card-title font-bold text-lg md:text-xl flex-1 outline-none break-all" onblur="updateTitle('${card.id}', this.innerText)">${card.title}</div>
                            <button onclick="deleteCard('${card.id}')" class="p-2 -mt-2 -mr-2 opacity-30 hover:opacity-100 hover:text-red-500 rounded-full transition-all"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                        </div>
                        <div class="space-y-1 min-h-[5px]">
                            ${card.items.map((it, i) => `
                                <div class="item-row flex items-start py-2 px-1 -mx-1 rounded-xl cursor-pointer hover:bg-black/5 dark:hover:bg-white/5 transition-colors group/item" onclick="toggleItem('${card.id}', ${i})">
                                    <button class="mt-0.5 mr-3 flex-shrink-0 opacity-70 transition-transform active:scale-90">
                                        <i data-lucide="${it.checked ? 'check-circle-2' : 'circle'}" class="w-5 h-5 ${it.checked ? 'text-orange-500 opacity-100' : ''}"></i>
                                    </button>
                                    <span class="text-base flex-1 break-all ${it.checked ? 'checked-text' : ''}">${it.text}</span>
                                    <button onclick="deleteItem('${card.id}', ${i}, event)" class="p-1.5 opacity-0 group-hover/item:opacity-100 hover:bg-red-500/10 hover:text-red-500 rounded-full transition-all ml-1"><i data-lucide="x" class="w-4 h-4"></i></button>
                                </div>
                            `).join('')}
                        </div>
                        <div class="mt-2 flex items-center gap-2 border-b border-black/10 dark:border-white/10 focus-within:border-orange-500 transition-colors pb-1">
                            <input type="text" id="input-${card.id}" placeholder="＋ アイテムを追加" 
                                   class="bg-transparent text-sm py-2.5 flex-1 focus:outline-none opacity-80" 
                                   onkeydown="if(event.key==='Enter'){ addItem('${card.id}'); }">
                            <button onclick="addItem('${card.id}')" class="p-2 opacity-50 hover:opacity-100 hover:text-orange-500 transition-colors">
                                <i data-lucide="corner-down-left" class="w-5 h-5"></i>
                            </button>
                        </div>
                        <div class="mt-4 flex flex-wrap gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                            ${COLORS.map(c => `<div onclick="updateColor('${card.id}', '${c.class}')" class="color-dot ${c.class}"></div>`).join('')}
                        </div>
                    </div>
                `;
                container.appendChild(el);
            });
            lucide.createIcons();
            setTimeout(resizeAllCards, 50);
            initSortable();
        }

        window.exportData = () => {
            const dataStr = JSON.stringify({ data: appData, tabs: tabNames }, null, 2);
            const blob = new Blob([dataStr], {type: "application/json"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `memo_backup.json`;
            a.click();
        };

        window.importData = () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = e => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = event => {
                    try {
                        const imported = JSON.parse(event.target.result);
                        if (imported.data && imported.tabs) {
                            appData = imported.data;
                            tabNames = imported.tabs;
                        } else {
                            appData = imported;
                        }
                        localStorage.setItem('memo_pro_v6_data', JSON.stringify(appData));
                        localStorage.setItem('memo_pro_v6_tabs', JSON.stringify(tabNames));
                        renderTabs();
                        renderCards();
                        alert("データを復元しました。");
                    } catch(err) { alert("正しいファイルを選択してください。"); }
                };
                reader.readAsText(file);
            };
            input.click();
        };

        window.addEventListener('resize', resizeAllCards);
        window.onload = init;
    </script>
</body>
</html>
